<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Builder</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
      }

      /* ──────────────────────────── LAYOUT ──────────────────────────── */
      .app {
        display: flex;
        min-height: 100vh;
      }

      /* ──────────────────────────── SIDEBAR ──────────────────────────── */
      .sidebar {
        width: 230px;
        background: #1a2535;
        color: white;
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
      .sidebar-logo {
        padding: 22px 24px;
        font-size: 20px;
        font-weight: 800;
        color: #f0a500;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        letter-spacing: -0.5px;
      }
      .sidebar-logo span {
        color: white;
      }
      .step-list {
        list-style: none;
        padding: 12px 0;
        flex: 1;
        overflow-y: auto;
      }
      .step-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 22px;
        cursor: pointer;
        transition: background 0.2s;
        color: rgba(255, 255, 255, 0.45);
        font-size: 13.5px;
      }
      .step-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .step-item.active {
        background: rgba(240, 165, 0, 0.15);
        color: white;
        border-right: 3px solid #f0a500;
      }
      .step-item.completed {
        color: rgba(255, 255, 255, 0.75);
      }
      .step-num {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.3s;
      }
      .step-item.active .step-num {
        background: #f0a500;
        border-color: #f0a500;
        color: white;
      }
      .step-item.completed .step-num {
        background: #27ae60;
        border-color: #27ae60;
        color: white;
        font-size: 14px;
      }
      .step-label {
        font-weight: 600;
        font-size: 13.5px;
      }

      /* Completeness */
      .completeness {
        padding: 18px 22px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .completeness-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
      }
      .completeness-pct {
        color: #27ae60;
        font-weight: 700;
        font-size: 13px;
      }
      .completeness-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 3px;
        overflow: hidden;
      }
      .completeness-fill {
        height: 100%;
        background: linear-gradient(90deg, #27ae60, #2ecc71);
        border-radius: 3px;
        transition: width 0.5s ease;
      }

      /* ──────────────────────────── MAIN ──────────────────────────── */
      .main {
        margin-left: 230px;
        flex: 1;
        display: flex;
        min-height: 100vh;
      }

      .form-area {
        flex: 1;
        padding: 44px 48px;
        background: white;
        min-height: 100vh;
        max-width: 640px;
      }
      .step-header {
        margin-bottom: 32px;
      }
      .step-title {
        font-size: 28px;
        font-weight: 800;
        color: #1a2535;
        margin-bottom: 6px;
      }
      .step-desc {
        color: #777;
        font-size: 14.5px;
        line-height: 1.5;
      }

      /* ──────────────────────────── FORM ELEMENTS ──────────────────────────── */
      .form-row {
        display: grid;
        gap: 14px;
        margin-bottom: 14px;
      }
      .form-row.two {
        grid-template-columns: 1fr 1fr;
      }
      .form-row.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .form-row.one {
        grid-template-columns: 1fr;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-label {
        font-size: 12.5px;
        font-weight: 700;
        color: #444;
        letter-spacing: 0.3px;
      }
      .form-label .req {
        color: #e74c3c;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="month"],
      select,
      textarea {
        padding: 10px 13px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
        background: white;
        color: #1a2535;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #4a90d9;
        box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
      }
      textarea {
        resize: vertical;
        min-height: 90px;
        line-height: 1.5;
      }

      /* Photo Upload */
      .photo-section {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        padding: 16px;
        background: #f8fafc;
        border-radius: 12px;
      }
      .photo-circle {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: #e2e8f0;
        border: 2px dashed #b0bec5;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
        transition: border-color 0.2s;
      }
      .photo-circle:hover {
        border-color: #4a90d9;
      }
      .photo-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .photo-placeholder {
        font-size: 28px;
      }
      .photo-text h4 {
        font-size: 14px;
        font-weight: 700;
        color: #1a2535;
        margin-bottom: 3px;
      }
      .photo-text p {
        font-size: 12px;
        color: #888;
        margin-bottom: 4px;
      }
      .photo-upload-link {
        color: #4a90d9;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      #photoInput {
        display: none;
      }

      /* Buttons */
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 32px;
        justify-content: flex-end;
        align-items: center;
      }
      .btn {
        padding: 11px 26px;
        border-radius: 50px;
        font-size: 14.5px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-primary {
        background: #f0a500;
        color: white;
      }
      .btn-primary:hover {
        background: #d4920a;
        transform: translateY(-1px);
      }
      .btn-outline {
        background: transparent;
        color: #1a2535;
        border: 2px solid #d0d8e4;
      }
      .btn-outline:hover {
        background: #f8fafc;
      }
      .btn-go-back {
        color: #4a90d9;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: inherit;
      }

      /* Item Cards */
      .item-card {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 14px;
        position: relative;
        background: #fafcff;
      }
      .item-card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
      }
      .item-card-title {
        font-weight: 700;
        font-size: 14.5px;
        color: #1a2535;
      }
      .item-card-subtitle {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }
      .btn-remove {
        background: none;
        border: none;
        color: #e74c3c;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 4px;
      }
      .btn-remove:hover {
        background: #fee2e2;
      }
      .add-btn {
        width: 100%;
        padding: 12px;
        border: 2px dashed #b0d4f1;
        border-radius: 10px;
        background: #f0f8ff;
        color: #4a90d9;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .add-btn:hover {
        background: #dbeeff;
        border-color: #4a90d9;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13.5px;
        color: #555;
        margin: 8px 0;
      }
      .checkbox-row input {
        width: 15px;
        height: 15px;
        cursor: pointer;
        accent-color: #4a90d9;
      }

      /* Skills */
      .category-label {
        font-size: 11.5px;
        font-weight: 700;
        color: #888;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
        margin-top: 18px;
      }
      .skill-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .skill-chip {
        padding: 5px 13px;
        border: 2px solid #e2e8f0;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        background: white;
        color: #444;
      }
      .skill-chip:hover {
        border-color: #4a90d9;
        color: #4a90d9;
      }
      .skill-chip.added {
        background: #dbeeff;
        border-color: #4a90d9;
        color: #1a6eb5;
      }

      .added-skills-label {
        font-size: 11.5px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        margin-top: 20px;
      }
      .added-skills-box {
        min-height: 48px;
        padding: 10px 12px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        background: #fafafa;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        align-items: flex-start;
      }
      .skill-tag {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #1a2535;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12.5px;
      }
      .skill-tag button {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0;
      }
      .skill-tag button:hover {
        color: white;
      }

      /* Summary */
      .summary-example {
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        padding: 14px 44px 14px 14px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: border-color 0.2s;
        font-size: 13.5px;
        color: #555;
        line-height: 1.6;
        position: relative;
      }
      .summary-example:hover {
        border-color: #f0a500;
      }
      .expert-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #fff3cd;
        color: #856404;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .summary-use-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #f0a500;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }

      /* Finalize */
      .template-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }
      .template-card {
        border: 3px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        aspect-ratio: 0.707;
        position: relative;
      }
      .template-card.selected {
        border-color: #f0a500;
        box-shadow: 0 0 0 2px rgba(240, 165, 0, 0.3);
      }
      .template-card:hover:not(.selected) {
        border-color: #4a90d9;
        transform: translateY(-2px);
      }
      .template-name {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(26, 37, 53, 0.85);
        color: white;
        text-align: center;
        padding: 7px;
        font-size: 12px;
        font-weight: 600;
      }
      .template-preview-frame {
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none;
        display: block;
      }

      /* ──────────────────────────── LIVE PREVIEW ──────────────────────────── */
      .preview-panel {
        width: 330px;
        background: #e8edf2;
        padding: 22px 18px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .preview-header {
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 14px;
      }
      .preview-scale-wrap {
        width: 100%;
        height: 416px;
        overflow: hidden;
        border-radius: 6px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        background: white;
      }
      .preview-inner {
        width: 595px;
        min-height: 842px;
        transform: scale(0.49);
        transform-origin: top left;
      }

      /* ──────────────────────────── RESPONSIVE ──────────────────────────── */
      @media (max-width: 900px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .preview-panel {
          display: none;
        }
        .form-area {
          max-width: 100%;
          padding: 28px 24px;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="sidebar-logo">📄 CV <span>Builder</span></div>
        <ul class="step-list" id="stepList"></ul>
        <div class="completeness">
          <div class="completeness-header">
            <span>Resume Completeness</span>
            <span class="completeness-pct" id="cpctText">0%</span>
          </div>
          <div class="completeness-bar">
            <div
              class="completeness-fill"
              id="cpctFill"
              style="width: 0%"
            ></div>
          </div>
        </div>
      </nav>

      <div class="main">
        <div class="form-area" id="formArea"></div>
        <div class="preview-panel">
          <div class="preview-header">Live Preview</div>
          <div class="preview-scale-wrap">
            <div class="preview-inner" id="previewInner"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ──────────── STATE ──────────── */
      const S = {
        step: 1,
        photo: null,
        firstName: "",
        lastName: "",
        profession: "",
        email: "",
        phone: "",
        city: "",
        jobs: [],
        education: [],
        skills: [],
        summary: "",
        template: "modern",
      };

      const STEPS = [
        { id: 1, label: "Heading" },
        { id: 2, label: "Work History" },
        { id: 3, label: "Education" },
        { id: 4, label: "Skills" },
        { id: 5, label: "Summary" },
        { id: 6, label: "Finalize" },
      ];

      const SKILL_CATS = {
        "Programming Languages": [
          "Python",
          "JavaScript",
          "Java",
          "C++",
          "C#",
          "TypeScript",
          "Go",
          "Kotlin",
        ],
        "Web & Frontend": [
          "HTML/CSS",
          "React",
          "Vue.js",
          "Next.js",
          "Angular",
          "Node.js",
          "REST API",
          "GraphQL",
        ],
        "Data & Cloud": [
          "SQL",
          "MongoDB",
          "AWS",
          "Docker",
          "Git",
          "Linux",
          "Machine Learning",
          "Tableau",
        ],
        "Soft Skills": [
          "Communication",
          "Teamwork",
          "Leadership",
          "Problem-solving",
          "Time Management",
          "Critical Thinking",
          "Adaptability",
          "Creativity",
        ],
        Tools: [
          "Microsoft Office",
          "Figma",
          "Photoshop",
          "Excel",
          "Jira",
          "Slack",
          "VS Code",
          "AutoCAD",
        ],
      };

      const SUMMARY_EX = [
        {
          star: true,
          text: "Passionate Computer Engineering student with hands-on experience building web applications and automation tools. Eager to contribute to innovative tech projects and grow as a software developer.",
        },
        {
          star: true,
          text: "Detail-oriented engineer with strong analytical skills and a track record of delivering quality software solutions. Experienced in full-stack development and agile methodologies.",
        },
        {
          star: false,
          text: "Motivated developer seeking to leverage technical skills and academic knowledge to solve real-world problems. Strong foundation in computer science fundamentals and modern development practices.",
        },
        {
          star: false,
          text: "Results-driven programmer with a passion for clean code and user-centric design. Committed to continuous learning and staying current with emerging technologies.",
        },
      ];

      /* ──────────── COMPLETENESS ──────────── */
      function calcPct() {
        let p = 0;
        if (S.photo) p += 5;
        if (S.firstName) p += 8;
        if (S.lastName) p += 7;
        if (S.profession) p += 8;
        if (S.email) p += 8;
        if (S.phone) p += 5;
        if (S.city) p += 4;
        if (S.jobs.length) p += 20;
        if (S.education.length) p += 15;
        if (S.skills.length >= 3) p += 10;
        else if (S.skills.length) p += 5;
        if (S.summary.length > 30) p += 10;
        return Math.min(p, 100);
      }
      function updatePct() {
        const p = calcPct();
        document.getElementById("cpctText").textContent = p + "%";
        document.getElementById("cpctFill").style.width = p + "%";
      }

      /* ──────────── SIDEBAR ──────────── */
      function renderSidebar() {
        document.getElementById("stepList").innerHTML = STEPS.map((st) => {
          const cls =
            S.step === st.id ? "active" : S.step > st.id ? "completed" : "";
          const num = S.step > st.id ? "✓" : st.id;
          return `<li class="step-item ${cls}" onclick="goToStep(${st.id})">
      <span class="step-num">${num}</span>
      <span class="step-label">${st.label}</span>
    </li>`;
        }).join("");
      }
      function goToStep(n) {
        if (n <= S.step) {
          S.step = n;
          renderAll();
        }
      }

      /* ──────────── RENDER ──────────── */
      function renderAll() {
        renderSidebar();
        renderStep();
        updatePct();
        updatePreview();
      }
      function tick() {
        updatePct();
        updatePreview();
      }

      function renderStep() {
        const area = document.getElementById("formArea");
        const map = {
          1: rHeading,
          2: rWork,
          3: rEdu,
          4: rSkills,
          5: rSummary,
          6: rFinalize,
        };
        area.innerHTML = (map[S.step] || rHeading)();
        bindPhoto();
      }

      function backBtn() {
        return S.step > 1
          ? `<button class="btn-go-back" onclick="back()">← Go Back</button>`
          : `<div></div>`;
      }
      function nextBtn(label) {
        return `<button class="btn btn-primary" onclick="nextStep()">${label || "Next"} →</button>`;
      }
      function nextStep() {
        if (S.step < 6) {
          S.step++;
          renderAll();
          window.scrollTo(0, 0);
        }
      }
      function back() {
        if (S.step > 1) {
          S.step--;
          renderAll();
          window.scrollTo(0, 0);
        }
      }

      /* ──────────── STEP 1 ──────────── */
      function rHeading() {
        const photoEl = S.photo
          ? `<img src="${S.photo}" alt="photo">`
          : `<span class="photo-placeholder">👤</span>`;
        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">What's the best way for employers to contact you?</h1>
    <p class="step-desc">We suggest including your name, profession, and contact details.</p>
  </div>
  <div class="photo-section">
    <div class="photo-circle" onclick="document.getElementById('photoInput').click()">${photoEl}</div>
    <div class="photo-text">
      <h4>Profile Photo</h4>
      <p>Optional — recommended for most templates</p>
      <span class="photo-upload-link" onclick="document.getElementById('photoInput').click()">Upload Photo</span>
    </div>
    <input type="file" id="photoInput" accept="image/*">
  </div>
  <div class="form-row two">
    <div class="form-group">
      <label class="form-label">First Name <span class="req">*</span></label>
      <input type="text" value="${e(S.firstName)}" placeholder="Metehan" oninput="S.firstName=this.value;tick()">
    </div>
    <div class="form-group">
      <label class="form-label">Last Name <span class="req">*</span></label>
      <input type="text" value="${e(S.lastName)}" placeholder="Ulusoy" oninput="S.lastName=this.value;tick()">
    </div>
  </div>
  <div class="form-row one">
    <div class="form-group">
      <label class="form-label">Profession</label>
      <input type="text" value="${e(S.profession)}" placeholder="Computer Engineer" oninput="S.profession=this.value;tick()">
    </div>
  </div>
  <div class="form-row two">
    <div class="form-group">
      <label class="form-label">Email <span class="req">*</span></label>
      <input type="email" value="${e(S.email)}" placeholder="you@example.com" oninput="S.email=this.value;tick()">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="tel" value="${e(S.phone)}" placeholder="+90 500 000 0000" oninput="S.phone=this.value;tick()">
    </div>
  </div>
  <div class="form-row one">
    <div class="form-group">
      <label class="form-label">City / Location</label>
      <input type="text" value="${e(S.city)}" placeholder="Istanbul, Turkey" oninput="S.city=this.value;tick()">
    </div>
  </div>
  <div class="btn-row">${nextBtn("Next: Work History")}</div>`;
      }

      /* ──────────── STEP 2 ──────────── */
      function rWork() {
        const cards = S.jobs
          .map(
            (j, i) => `
    <div class="item-card">
      <div class="item-card-top">
        <div>
          <div class="item-card-title">${e(j.title) || "New Position"}${j.company ? ' @ <span style="color:#888;font-weight:400">' + e(j.company) + "</span>" : ""}</div>
          <div class="item-card-subtitle">${j.startDate ? fmt(j.startDate) : ""} ${j.startDate && (j.current || j.endDate) ? "–" : ""} ${j.current ? "Present" : j.endDate ? fmt(j.endDate) : ""}</div>
        </div>
        <button class="btn-remove" onclick="rmJob(${i})" title="Remove">✕</button>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label class="form-label">Job Title <span class="req">*</span></label>
          <input type="text" value="${e(j.title)}" placeholder="Software Developer" oninput="S.jobs[${i}].title=this.value;tick()">
        </div>
        <div class="form-group">
          <label class="form-label">Company <span class="req">*</span></label>
          <input type="text" value="${e(j.company)}" placeholder="Company Name" oninput="S.jobs[${i}].company=this.value;tick()">
        </div>
      </div>
      <div class="form-row one">
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" value="${e(j.location)}" placeholder="Istanbul, Turkey" oninput="S.jobs[${i}].location=this.value;tick()">
        </div>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="month" value="${j.startDate || ""}" oninput="S.jobs[${i}].startDate=this.value;tick()">
        </div>
        <div class="form-group">
          <label class="form-label">End Date</label>
          <input type="month" value="${j.endDate || ""}" oninput="S.jobs[${i}].endDate=this.value;tick()" ${j.current ? "disabled" : ""}>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="cur${i}" ${j.current ? "checked" : ""} onchange="S.jobs[${i}].current=this.checked;renderStep()">
        <label for="cur${i}">I currently work here</label>
      </div>
      <div class="form-row one" style="margin-top:10px">
        <div class="form-group">
          <label class="form-label">Responsibilities & Achievements</label>
          <textarea placeholder="Describe your key responsibilities..." oninput="S.jobs[${i}].desc=this.value;tick()">${e(j.desc)}</textarea>
        </div>
      </div>
    </div>`,
          )
          .join("");

        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">Tell us about your work experience</h1>
    <p class="step-desc">Start with your most recent job. No experience yet? You can skip this step.</p>
  </div>
  ${cards}
  <button class="add-btn" onclick="addJob()">+ Add Work Experience</button>
  <div class="btn-row">
    <button class="btn-go-back" onclick="nextStep()" style="color:#888">Skip for now</button>
    ${nextBtn("Next: Education")}
  </div>`;
      }

      function addJob() {
        S.jobs.push({
          title: "",
          company: "",
          location: "",
          startDate: "",
          endDate: "",
          current: false,
          desc: "",
        });
        renderStep();
      }
      function rmJob(i) {
        S.jobs.splice(i, 1);
        renderStep();
        tick();
      }

      /* ──────────── STEP 3 ──────────── */
      function rEdu() {
        const cards = S.education
          .map(
            (ed, i) => `
    <div class="item-card">
      <div class="item-card-top">
        <div>
          <div class="item-card-title">${e(ed.institution) || "Institution"}</div>
          <div class="item-card-subtitle">${e(ed.field) || "Field of Study"}</div>
        </div>
        <button class="btn-remove" onclick="rmEdu(${i})" title="Remove">✕</button>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label class="form-label">Institution <span class="req">*</span></label>
          <input type="text" value="${e(ed.institution)}" placeholder="University Name" oninput="S.education[${i}].institution=this.value;tick()">
        </div>
        <div class="form-group">
          <label class="form-label">Field of Study</label>
          <input type="text" value="${e(ed.field)}" placeholder="Computer Engineering" oninput="S.education[${i}].field=this.value;tick()">
        </div>
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label class="form-label">Degree</label>
          <select onchange="S.education[${i}].degree=this.value;tick()">
            <option value="">Select Degree</option>
            ${[
              "High School Diploma",
              "Associate's",
              "Bachelor's",
              "Master's",
              "Doctorate",
              "Certificate",
            ]
              .map(
                (d) =>
                  `<option value="${d}" ${ed.degree === d ? "selected" : ""}>${d}</option>`,
              )
              .join("")}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Graduation Date</label>
          <input type="month" value="${ed.gradDate || ""}" oninput="S.education[${i}].gradDate=this.value;tick()">
        </div>
      </div>
    </div>`,
          )
          .join("");

        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">Let's work on your education</h1>
    <p class="step-desc">Include your degrees and certifications. Current students are welcome too.</p>
  </div>
  ${cards}
  <button class="add-btn" onclick="addEdu()">+ Add Education</button>
  <div class="btn-row">${nextBtn("Next: Skills")}</div>`;
      }

      function addEdu() {
        S.education.push({
          institution: "",
          field: "",
          degree: "",
          gradDate: "",
        });
        renderStep();
      }
      function rmEdu(i) {
        S.education.splice(i, 1);
        renderStep();
        tick();
      }

      /* ──────────── STEP 4 ──────────── */
      function rSkills() {
        const cats = Object.entries(SKILL_CATS)
          .map(([cat, list]) => {
            const chips = list
              .map((sk) => {
                const added = S.skills.includes(sk);
                return `<span class="skill-chip ${added ? "added" : ""}" onclick="toggleSk('${sk}')">${added ? "✓ " : "" + ""}${sk}</span>`;
              })
              .join("");
            return `<div class="category-label">${cat}</div><div class="skill-chips">${chips}</div>`;
          })
          .join("");

        const tags = S.skills.length
          ? S.skills
              .map(
                (sk) =>
                  `<span class="skill-tag">${e(sk)}<button onclick="rmSk('${sk}')">×</button></span>`,
              )
              .join("")
          : `<span style="color:#aaa;font-size:13px;padding:4px 0">Click skills above to add them here...</span>`;

        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">What skills would you like to highlight?</h1>
    <p class="step-desc">Choose from our suggestions below or add your own.</p>
  </div>
  ${cats}
  <div class="form-row one" style="margin-top:20px">
    <div class="form-group">
      <label class="form-label">Add Custom Skill</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="custSkill" placeholder="e.g. MATLAB, Blender, Arduino..." style="flex:1" onkeydown="if(event.key==='Enter')addCustSk()">
        <button class="btn btn-outline" onclick="addCustSk()">Add</button>
      </div>
    </div>
  </div>
  <div class="added-skills-label">Your Skills (${S.skills.length})</div>
  <div class="added-skills-box">${tags}</div>
  <div class="btn-row">${nextBtn("Next: Summary")}</div>`;
      }

      function toggleSk(sk) {
        const i = S.skills.indexOf(sk);
        if (i === -1) S.skills.push(sk);
        else S.skills.splice(i, 1);
        renderStep();
        tick();
      }
      function rmSk(sk) {
        S.skills = S.skills.filter((s) => s !== sk);
        renderStep();
        tick();
      }
      function addCustSk() {
        const inp = document.getElementById("custSkill");
        const v = (inp.value || "").trim();
        if (v && !S.skills.includes(v)) {
          S.skills.push(v);
          inp.value = "";
          renderStep();
          tick();
        }
      }

      /* ──────────── STEP 5 ──────────── */
      function rSummary() {
        const exHtml = SUMMARY_EX.map(
          (ex, i) => `
    <div class="summary-example" onclick="useSummary(${i})">
      ${ex.star ? '<div class="expert-badge">⭐ Expert Recommended</div><br>' : ""}
      ${e(ex.text)}
      <button class="summary-use-btn" title="Use this example">+</button>
    </div>`,
        ).join("");

        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">Briefly tell us about your background</h1>
    <p class="step-desc">Choose from our pre-written examples below or write your own summary.</p>
  </div>
  ${exHtml}
  <div class="form-group" style="margin-top:16px">
    <label class="form-label">Your Summary</label>
    <textarea rows="5" placeholder="Write your professional summary here..." oninput="S.summary=this.value;tick()">${e(S.summary)}</textarea>
  </div>
  <div class="btn-row">
    <button class="btn-go-back" onclick="nextStep()" style="color:#888">Skip for now</button>
    ${nextBtn("Next: Finalize")}
  </div>`;
      }

      function useSummary(i) {
        S.summary = SUMMARY_EX[i].text;
        renderStep();
        tick();
      }

      /* ──────────── STEP 6 ──────────── */
      function rFinalize() {
        const tnames = {
          modern: "Modern",
          classic: "Classic",
          minimal: "Minimal",
          creative: "Creative",
        };
        const cards = ["modern", "classic", "minimal", "creative"]
          .map((t) => {
            const sel = S.template === t;
            const miniHtml = e(buildCV(t));
            return `<div class="template-card ${sel ? "selected" : ""}" onclick="selectTpl('${t}')">
      <iframe class="template-preview-frame" srcdoc="${miniHtml}"></iframe>
      <div class="template-name">${tnames[t]}</div>
    </div>`;
          })
          .join("");

        return `
  <div class="step-header">
    ${backBtn()}
    <h1 class="step-title" style="margin-top:12px">Looking good! Choose your template</h1>
    <p class="step-desc">Pick a design that best represents you, then download your finished CV.</p>
  </div>
  <div class="template-grid">${cards}</div>
  <div class="btn-row" style="justify-content:center;gap:16px;flex-wrap:wrap">
    <button class="btn btn-outline" onclick="previewFull()" style="font-size:15px">👁 Full Preview</button>
    <button class="btn btn-primary" onclick="downloadCV(this)" style="font-size:15px;padding:12px 32px">⬇ Download CV</button>
  </div>`;
      }

      function selectTpl(t) {
        S.template = t;
        renderStep();
        updatePreview();
      }
      function previewFull() {
        const w = window.open("", "_blank");
        w.document.write(buildCV(S.template));
        w.document.close();
      }
      async function downloadCV(btn) {
        const origHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "⏳ Oluşturuluyor...";

        try {
          const cvHtml = buildCV(S.template);

          // Create a hidden iframe to render the full CV HTML
          const iframe = document.createElement("iframe");
          iframe.style.cssText =
            "position:fixed;left:-9999px;top:0;width:595px;height:842px;border:none;";
          document.body.appendChild(iframe);

          // Write CV and wait for it to fully load
          await new Promise((resolve) => {
            iframe.onload = resolve;
            iframe.contentDocument.open();
            iframe.contentDocument.write(cvHtml);
            iframe.contentDocument.close();
          });

          // Small delay for fonts/images to settle
          await new Promise((r) => setTimeout(r, 400));

          const iBody = iframe.contentDocument.body;
          const iDoc = iframe.contentDocument.documentElement;
          const cvH = Math.max(iBody.scrollHeight, iDoc.scrollHeight, 842);

          // Capture the rendered CV as a high-res canvas
          const canvas = await html2canvas(iBody, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            width: 595,
            height: cvH,
            windowWidth: 595,
            windowHeight: cvH,
            scrollX: 0,
            scrollY: 0,
          });

          document.body.removeChild(iframe);

          // Build PDF with exact A4 proportions
          const { jsPDF } = window.jspdf;
          const pdfW = 595,
            pdfH = (canvas.height / canvas.width) * pdfW;
          const pdf = new jsPDF({
            orientation: "portrait",
            unit: "px",
            format: [pdfW, pdfH],
          });
          pdf.addImage(
            canvas.toDataURL("image/jpeg", 0.95),
            "JPEG",
            0,
            0,
            pdfW,
            pdfH,
          );

          const fname =
            [S.firstName, S.lastName].filter(Boolean).join("_") || "CV";
          pdf.save(fname + "_CV.pdf");
        } catch (err) {
          console.error("PDF error:", err);
          alert(
            'PDF oluşturulamadı. Lütfen "Preview" butonunu kullanıp tarayıcıdan kaydedin.',
          );
        }

        btn.innerHTML = origHtml;
        btn.disabled = false;
      }

      /* ──────────── PHOTO BIND ──────────── */
      function bindPhoto() {
        const inp = document.getElementById("photoInput");
        if (!inp) return;
        inp.addEventListener("change", function () {
          const f = this.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = (ev) => {
            S.photo = ev.target.result;
            renderStep();
            tick();
          };
          r.readAsDataURL(f);
        });
      }

      /* ──────────── HELPERS ──────────── */
      function e(s) {
        if (s === null || s === undefined) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function fmt(d) {
        if (!d) return "";
        const [y, m] = d.split("-");
        return (
          [
            "Jan",
            "Feb",
            "Mar",
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec",
          ][(parseInt(m) || 1) - 1] +
          " " +
          y
        );
      }

      /* ──────────── LIVE PREVIEW ──────────── */
      function updatePreview() {
        const el = document.getElementById("previewInner");
        if (el) el.innerHTML = buildCV(S.template);
      }

      /* ──────────── CV TEMPLATES ──────────── */
      /* Print CSS eklenir — tüm şablonlarda tarayıcı header/footer gizlenir */
      const PRINT_CSS = `@page{margin:0;size:A4;}@media print{html,body{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}}`;

      function buildCV(tpl) {
        const d = S;
        const name =
          [d.firstName, d.lastName].filter(Boolean).join(" ") || "Your Name";
        const contacts = [d.email, d.phone, d.city].filter(Boolean);

        function photoEl(pCls, pHCls) {
          return d.photo
            ? `<img class="${pCls}" src="${d.photo}" alt="">`
            : `<div class="${pHCls}">👤</div>`;
        }

        function jobsHtml(fn) {
          return d.jobs
            .map((j) => {
              const per = [
                j.startDate ? fmt(j.startDate) : "",
                j.current ? "Present" : j.endDate ? fmt(j.endDate) : "",
              ]
                .filter(Boolean)
                .join(" – ");
              return fn(j, per);
            })
            .join("");
        }

        function eduHtml(fn) {
          return d.education
            .map((ed) => {
              const deg = [ed.degree, ed.field].filter(Boolean).join(" in ");
              return fn(ed, deg);
            })
            .join("");
        }

        /* ── MODERN ── */
        if (tpl === "modern")
          return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
${PRINT_CSS}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:white;min-height:842px;}
.hd{background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:white;padding:36px 40px;display:flex;align-items:center;gap:24px;}

.phx{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;}

.st{font-size:10.5px;font-weight:800;color:#6c3fc5;text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid #6c3fc5;padding-bottom:5px;margin-bottom:13px;}
.sc{margin-bottom:22px;}
.jt{font-size:13.5px;font-weight:700;color:#1a2535;}
.jc{font-size:12px;color:#6c3fc5;font-weight:600;}
.jp{font-size:11px;color:#888;margin-bottom:5px;}
.jd{font-size:12px;color:#555;line-height:1.6;margin-bottom:13px;}
.et{font-size:13px;font-weight:700;color:#1a2535;}
.ec{font-size:11.5px;color:#666;}
.ep{font-size:11px;color:#888;margin-bottom:11px;}

.sn{font-size:12px;color:#444;}
.dts{display:flex;gap:3px;}
.dt{width:7px;height:7px;border-radius:50%;background:#e2e8f0;}
.dtf{background:#6c3fc5;}
.sm{font-size:12.5px;color:#555;line-height:1.7;}
.ci{font-size:12px;color:#555;margin-bottom:7px;}
</style></head><body>
<div class="hd">
  ${photoEl("ph", "phx")}
  <div>
    <div class="nm">${e(name)}</div>
    <div class="ttl">${e(d.profession)}</div>
    <div class="cts">${contacts.map((c) => `<span>${e(c)}</span>`).join(" · ")}</div>
  </div>
</div>
<div class="bd">
  <div>
    ${d.summary ? `<div class="sc"><div class="st">PROFILE</div><div class="sm">${e(d.summary)}</div></div>` : ""}
    ${d.jobs.length ? `<div class="sc"><div class="st">EXPERIENCE</div>${jobsHtml((j, per) => `<div><div class="jt">${e(j.title)}</div><div class="jc">${e(j.company)}${j.location ? " · " + e(j.location) : ""}</div><div class="jp">${per}</div>${j.desc ? `<div class="jd">${e(j.desc)}</div>` : ""}</div>`)}</div>` : ""}
    ${d.education.length ? `<div class="sc"><div class="st">EDUCATION</div>${eduHtml((ed, deg) => `<div><div class="et">${e(deg) || "Degree"}</div><div class="ec">${e(ed.institution)}</div><div class="ep">${ed.gradDate ? fmt(ed.gradDate) : ""}</div></div>`)}</div>` : ""}
  </div>
  <div>
    <div class="sc"><div class="st">CONTACT</div>
      ${d.email ? `<div class="ci">✉ ${e(d.email)}</div>` : ""}
      ${d.phone ? `<div class="ci">📞 ${e(d.phone)}</div>` : ""}
      ${d.city ? `<div class="ci">📍 ${e(d.city)}</div>` : ""}
    </div>
    ${d.skills.length ? `<div class="sc"><div class="st">SKILLS</div>${d.skills.map((sk) => `<div class="skr"><span class="sn">${e(sk)}</span><div class="dts">${[1, 2, 3, 4, 5].map((n) => `<div class="dt ${n <= 4 ? "dtf" : ""}"></div>`).join("")}</div></div>`).join("")}</div>` : ""}
  </div>
</div>
</body></html>`;

        /* ── CLASSIC ── */
        if (tpl === "classic")
          return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
${PRINT_CSS}

body{font-family:Georgia,serif;background:white;min-height:842px;}

.ttl{font-size:14px;color:#b8860b;margin-bottom:9px;font-style:italic;}
.cts{font-size:11.5px;color:#666;display:flex;flex-wrap:wrap;gap:10px;}
.bd{padding:26px 40px;}
.sc{margin-bottom:22px;}
.st{font-size:12px;font-weight:700;color:#1a2535;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid #b8860b;padding-bottom:5px;margin-bottom:13px;}
.jt{font-size:13.5px;font-weight:700;color:#1a2535;}
.jc{font-size:12px;color:#b8860b;}
.jp{font-size:11px;color:#888;margin-bottom:5px;}
.jd{font-size:12px;color:#555;line-height:1.6;margin-bottom:13px;}
.et{font-size:13px;font-weight:700;color:#1a2535;}
.ec{font-size:11.5px;color:#666;}
.ep{font-size:11px;color:#888;margin-bottom:11px;}
.sks{display:flex;flex-wrap:wrap;gap:7px;}
.sb{padding:3px 11px;background:#f5f5f0;border:1px solid #d4c5a0;border-radius:3px;font-size:11.5px;color:#444;}
.sm{font-size:12.5px;color:#555;line-height:1.7;font-style:italic;}
</style></head><body>
<div class="hd">
  ${photoEl("ph", "phx")}
  <div>
